<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landaria — Phaser 3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }
    #game-container canvas {
      border: 3px solid #2a1a4a;
      box-shadow: 0 0 60px rgba(80, 30, 180, 0.35);
    }
    #hud {
      color: #665580;
      font-size: 12px;
      margin-top: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="hud">A/D — Mover &nbsp;|&nbsp; Espaço — Pular/Paraquedas &nbsp;|&nbsp; V — Loja &nbsp;|&nbsp; Clique — Atacar</div>

  <!-- Phaser precisa ser global antes do módulo ES -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.88.2/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
  <script>/*

    // ── Helpers ───────────────────────────────────────────────────────────────

    // Rotate point (dx, dy) by angle around origin
    function rot(dx, dy, a) {
      const c = Math.cos(a), s = Math.sin(a);
      return { x: dx * c - dy * s, y: dx * s + dy * c };
    }

    // Filled rotated rectangle; pivot = top-center of the rect
    function fillRotatedRect(g, pivX, pivY, rw, rh, angle, colorHex, alpha) {
      const corners = [
        rot(-rw / 2, 0,  angle),
        rot( rw / 2, 0,  angle),
        rot( rw / 2, rh, angle),
        rot(-rw / 2, rh, angle),
      ].map(p => ({ x: pivX + p.x, y: pivY + p.y }));
      g.fillStyle(colorHex, alpha ?? 1);
      g.fillPoints(corners, true);
    }

    // Fill the top half of an ellipse (for the helmet dome)
    function fillTopHalfEllipse(g, cx, cy, rx, ry, colorHex) {
      const pts = [{ x: cx - rx, y: cy }];
      for (let i = 0; i <= 32; i++) {
        const a = Math.PI + Math.PI * (i / 32);   // π → 2π  (top arc)
        pts.push({ x: cx + Math.cos(a) * rx, y: cy + Math.sin(a) * ry });
      }
      pts.push({ x: cx + rx, y: cy });
      g.fillStyle(colorHex, 1);
      g.fillPoints(pts, true);
    }

    // ── Phaser Scene ──────────────────────────────────────────────────────────

    class GameScene extends Phaser.Scene {
      constructor() { super('Game'); }

      create() {
        // Static background drawn once
        this.bg  = this.add.graphics();
        // Player redrawn every frame
        this.gfx = this.add.graphics();

        this.player = {
          x: W / 2,
          y: GROUND_TOP + GROUND_H * 0.60,
          vx: 0, vy: 0,
          baseW: 28, baseH: 50,
          maxSpeed: 4.8, accel: 0.52, friction: 0.80,
          facing: 1, walkTime: 0,
        };

        // Phaser built-in cursor keys (arrows + shift/space)
        this.cursors = this.input.keyboard.createCursorKeys();

        // WASD keys
        this.wasd = this.input.keyboard.addKeys({
          up:    Phaser.Input.Keyboard.KeyCodes.W,
          down:  Phaser.Input.Keyboard.KeyCodes.S,
          left:  Phaser.Input.Keyboard.KeyCodes.A,
          right: Phaser.Input.Keyboard.KeyCodes.D,
        });

        this.drawBackground();
      }

      // ── Background (static) ────────────────────────────────────────────────
      drawBackground() {
        const g = this.bg;

        // Sky gradient (top dark → bottom lighter purple)
        g.fillGradientStyle(0x130828, 0x130828, 0x2e1260, 0x2e1260, 1);
        g.fillRect(0, 0, W, GROUND_TOP);

        // Distant hills silhouette
        g.fillStyle(0x1e0c42, 1);
        g.beginPath();
        g.moveTo(0, GROUND_TOP);
        for (let x = 0; x <= W; x += 3) {
          const yh = GROUND_TOP - (28 + Math.sin(x * 0.018) * 18 + Math.sin(x * 0.006 + 1) * 22);
          g.lineTo(x, yh);
        }
        g.lineTo(W, GROUND_TOP);
        g.closePath();
        g.fillPath();

        // Ground gradient split into two halves for 3-stop approximation
        g.fillGradientStyle(0x264426, 0x264426, 0x346034, 0x346034, 1);
        g.fillRect(0, GROUND_TOP, W, GROUND_H / 2);
        g.fillGradientStyle(0x346034, 0x346034, 0x1c361c, 0x1c361c, 1);
        g.fillRect(0, GROUND_TOP + GROUND_H / 2, W, GROUND_H / 2 + 2);

        // Perspective converging lines (vanishing point at horizon center)
        const vpx = W / 2;
        for (let i = 0; i <= 18; i++) {
          const t     = i / 18;
          const bx    = t * W;
          const alpha = 0.03 + Math.abs(t - 0.5) * 0.10;
          g.lineStyle(1, 0x000000, alpha);
          g.lineBetween(vpx, GROUND_TOP, bx, GROUND_BOTTOM);
        }

        // Horizontal depth bands
        for (let i = 0; i <= 14; i++) {
          const t = i / 14;
          const y = GROUND_TOP + t * GROUND_H;
          g.lineStyle(1, 0x000000, 0.03 + t * 0.07);
          g.lineBetween(0, y, W, y);
        }

        // Below-ground ledge strip
        g.fillStyle(0x101e10, 1);
        g.fillRect(0, GROUND_BOTTOM, W, H - GROUND_BOTTOM);

        // Ledge highlight line
        g.lineStyle(2, 0x50a050, 0.18);
        g.lineBetween(0, GROUND_BOTTOM, W, GROUND_BOTTOM);
      }

      // ── Update ─────────────────────────────────────────────────────────────
      update(time, delta) {
        const { cursors, wasd, player } = this;

        const left  = cursors.left.isDown  || wasd.left.isDown;
        const right = cursors.right.isDown || wasd.right.isDown;
        const up    = cursors.up.isDown    || wasd.up.isDown;
        const down  = cursors.down.isDown  || wasd.down.isDown;

        if (left)  player.vx -= player.accel;
        if (right) player.vx += player.accel;
        if (up)    player.vy -= player.accel * 0.62;
        if (down)  player.vy += player.accel * 0.62;

        player.vx *= player.friction;
        player.vy *= player.friction;

        const spd = Math.hypot(player.vx, player.vy);
        if (spd > player.maxSpeed) {
          player.vx *= player.maxSpeed / spd;
          player.vy *= player.maxSpeed / spd;
        }

        player.x += player.vx;
        player.y += player.vy;

        if (player.vx >  0.25) player.facing =  1;
        if (player.vx < -0.25) player.facing = -1;

        if (spd > 0.25) player.walkTime += delta * spd * 0.013;
        else            player.walkTime  *= 0.88;

        player.x = Phaser.Math.Clamp(player.x, player.baseW * 0.5, W - player.baseW * 0.5);
        player.y = Phaser.Math.Clamp(player.y, GROUND_TOP + 10, GROUND_BOTTOM);

        this.drawPlayer();
      }

      // ── Player (redrawn each frame) ────────────────────────────────────────
      drawPlayer() {
        const g = this.gfx;
        g.clear();

        const { x, y, facing, walkTime, vx, vy, baseW, baseH } = this.player;
        const spd    = Math.hypot(vx, vy);
        const moving = spd > 0.25;

        // Depth scale: 0 (far/top) → 1 (near/bottom)
        const depthT = (y - GROUND_TOP) / GROUND_H;
        const scale  = 0.55 + depthT * 0.55;
        const w = baseW * scale;
        const h = baseH * scale;

        const leg   = { w: w * 0.28, h: h * 0.33 };
        const body  = { w: w * 0.72, h: h * 0.42 };
        const arm   = { w: w * 0.22, h: h * 0.30 };
        const headR = w * 0.37;

        const legBaseY = y - (leg.h + h * 0.02);
        const bodyTop  = legBaseY - body.h;
        const armY     = bodyTop + body.h * 0.08;
        const headY    = bodyTop - headR * 0.75;

        const swing    = moving ? Math.sin(walkTime) * 0.34 : 0;
        const armSwing = moving ? Math.sin(walkTime + Math.PI) * 0.38 : 0;

        // fx: mirror dx offset according to facing direction
        const fx = (dx) => x + dx * facing;

        // ── Shadow ────────────────────────────────────────────────────────
        g.fillStyle(0x000000, 0.25 + depthT * 0.20);
        g.fillEllipse(x, y, w * 1.16, w * 0.36);

        // ── Legs ──────────────────────────────────────────────────────────
        [
          { dx: -w * 0.16, angle:  swing * facing },
          { dx:  w * 0.16, angle: -swing * facing },
        ].forEach(({ dx, angle }) => {
          const pivX = fx(dx);
          // Thigh + shin
          fillRotatedRect(g, pivX, legBaseY, leg.w, leg.h, angle, 0x5030a0);
          // Boot at bottom of leg
          const bootH  = leg.h * 0.28;
          const bootOff = rot(0, leg.h - bootH, angle);
          fillRotatedRect(g, pivX + bootOff.x, legBaseY + bootOff.y, leg.w * 1.3, bootH, angle, 0x3a2070);
        });

        // ── Body ──────────────────────────────────────────────────────────
        g.fillStyle(0xc87818, 1);
        g.fillRoundedRect(x - body.w / 2, bodyTop, body.w, body.h, body.w * 0.16);

        // Chest plate
        g.fillStyle(0xa86010, 1);
        g.fillRoundedRect(
          x - body.w * 0.28, bodyTop + body.h * 0.15,
          body.w * 0.56,     body.h * 0.42,
          body.w * 0.10
        );

        // Belt strap
        g.fillStyle(0x7a3c08, 1);
        g.fillRect(x - body.w / 2, bodyTop + body.h * 0.74, body.w, body.h * 0.14);

        // Belt buckle
        g.fillStyle(0xe0c040, 1);
        g.fillRect(x - body.w * 0.08, bodyTop + body.h * 0.72, body.w * 0.16, body.h * 0.18);

        // ── Arms ──────────────────────────────────────────────────────────
        [
          { dx: -(body.w / 2 + arm.w * 0.25), angle:  armSwing * facing },
          { dx:  (body.w / 2 + arm.w * 0.25), angle: -armSwing * facing },
        ].forEach(({ dx, angle }) => {
          const pivX = fx(dx);
          // Forearm
          fillRotatedRect(g, pivX, armY, arm.w, arm.h, angle, 0xc87818);
          // Glove at bottom of arm
          const gloveH  = arm.h * 0.30;
          const gloveOff = rot(0, arm.h - gloveH, angle);
          fillRotatedRect(g, pivX + gloveOff.x, armY + gloveOff.y, arm.w * 1.1, gloveH, angle, 0x7a3c08);
        });

        // ── Head ──────────────────────────────────────────────────────────
        g.fillStyle(0xf0c468, 1);
        g.fillCircle(x, headY, headR);

        // Helmet dome
        fillTopHalfEllipse(g, x, headY - headR * 0.18, headR * 1.08, headR * 0.68, 0x904e10);

        // Helmet rim bar
        g.fillStyle(0x7a3e0c, 1);
        g.fillRoundedRect(x - headR * 1.12, headY - headR * 0.22, headR * 2.24, headR * 0.20, headR * 0.07);

        // Helmet surface highlight
        g.fillStyle(0xffdc8c, 0.20);
        g.fillEllipse(x - headR * 0.25 * facing, headY - headR * 0.55, headR * 0.70, headR * 0.40);

        // Eyes
        const eyeX  = headR * 0.32;
        const eyeY  = headY + headR * 0.08;
        const eyeRr = headR * 0.16;
        g.fillStyle(0x1a1a2e, 1);
        g.fillCircle(fx(-eyeX), eyeY, eyeRr);
        g.fillCircle(fx( eyeX), eyeY, eyeRr);

        // Eye highlights
        g.fillStyle(0xffffff, 1);
        g.fillCircle(fx(-eyeX) + eyeRr * 0.4 * facing, eyeY - eyeRr * 0.4, eyeRr * 0.38);
        g.fillCircle(fx( eyeX) + eyeRr * 0.4 * facing, eyeY - eyeRr * 0.4, eyeRr * 0.38);
      }
    }

    // ── Boot Phaser ───────────────────────────────────────────────────────────
    new Phaser.Game({
      type:            Phaser.AUTO,
      width:           W,
      height:          H,
      backgroundColor: '#0d0d1a',
      parent:          'game-container',
      scene:           GameScene,
    });
  */</script>
</body>
</html>
